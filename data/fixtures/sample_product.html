<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Demo Store - Product</title>
</head>

<body>
    <main class="product-page">
        <article
            class="product"
            data-listing-id="DEMO-RTX5070TI-001"
        >
            <h1 class="product__title">
                MSI GeForce RTX 5070 Ti 16G Gaming Trio OC
            </h1>

            <p class="product__brand">
                MSI
            </p>

            <p class="product__model">
                RTX-5070-TI-GAMING-TRIO-OC
            </p>

            <div class="product__pricing">
                <span class="product__original-price">
                    $24,999.00
                </span>

                <span class="product__current-price">
                    $21,499.00
                </span>

                <span class="product__currency">
                    MXN
                </span>
            </div>

            <p
                class="product__availability"
                data-available="true"
            >
                Disponible
            </p>

            <p class="product__shipping">
                Envío gratis
            </p>

            <img
                class="product__image"
                src="https://example.com/images/rtx-5070-ti.jpg"
                alt="MSI GeForce RTX 5070 Ti"
            >
        </article>
    </main>
</body>
</html>
